name: Docker Image CI

on:
  schedule:
    - cron: "0 10 * * 1"
  push:
    branches:
      - 'master'

jobs:
  docker:
    name: Push Docker image to multiple registries
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      -
        name: Get current date
        id: getdate
        uses: Kaven-Universe/github-action-current-date-time@v1
        with:
          format: "YYYY-MM-DD"
      -
        name: Checkout
        uses: actions/checkout@v5
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to Docker Hub - account 1
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER_PBQ }}
          password: ${{ secrets.DOCKERHUB_TOKEN_PBQ }}
      - 
        name: Log in to Github Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          provenance: false
          platforms: linux/amd64
          push: true
          tags: |
            pilbbq/deluge:latest
            pilbbq/deluge:autobuilt
            pilbbq/deluge:${{ steps.getdate.outputs.time }}
            ghcr.io/packettoobig/docker-deluge:latest
            ghcr.io/packettoobig/docker-deluge:autobuilt
            ghcr.io/packettoobig/docker-deluge:${{ steps.getdate.outputs.time }}
